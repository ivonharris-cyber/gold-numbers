<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เลขทอง — เลขเด็ดสลากกินแบ่งรัฐบาล</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>🏆 เลขทอง</h1>
  <p class="tagline">เลขเด็ดสลากกินแบ่งรัฐบาล — สถิติ ดวงดาว และเลขมงคลของคุณ</p>
</header>

<main>
  <section class="controls">
    <label for="sign">ราศีของคุณ</label>
    <select id="sign">
      <option value="aries">♈ เมษ</option>
      <option value="taurus">♉ พฤษภ</option>
      <option value="gemini">♊ เมถุน</option>
      <option value="cancer">♋ กรกฎ</option>
      <option value="leo">♌ สิงห์</option>
      <option value="virgo">♍ กันย์</option>
      <option value="libra">♎ ตุลย์</option>
      <option value="scorpio">♏ พิจิก</option>
      <option value="sagittarius">♐ ธนู</option>
      <option value="capricorn">♑ มังกร</option>
      <option value="aquarius">♒ กุมภ์</option>
      <option value="pisces">♓ มีน</option>
    </select>

    <label for="favoured">เลขมงคลของคุณ (ไม่บังคับ เช่น 3,7,9)</label>
    <input id="favoured" type="text" inputmode="numeric" placeholder="3,7,9" maxlength="12">

    <div class="birth-row">
      <div>
        <label for="birthdate">วันเกิด</label>
        <input id="birthdate" type="date">
      </div>
      <div>
        <label for="birthtime">เวลาเกิด</label>
        <input id="birthtime" type="time">
      </div>
    </div>

    <button id="generate">✨ ทำนาย 10 ชุดเลขทอง</button>
  </section>

  <section id="oracle" class="oracle" hidden>
    <h2>🎫 ฤกษ์ซื้อหวย</h2>
    <p id="oracle-text"></p>
  </section>

  <section id="hotcold" class="hotcold" hidden>
    <h2>สถิติเลขที่ออกบ่อยช่วงนี้</h2>
    <div id="hotcold-body"></div>
  </section>

  <section id="results" class="results" aria-live="polite"></section>

  <footer class="disclaimer">
    <strong>เพื่อความบันเทิงเท่านั้น</strong> การออกรางวัลสลากเป็นเรื่องสุ่ม —
    ไม่มีวิธีใดทำนายเลขที่จะออกได้จริง เล่นอย่างมีสติ อย่าใช้เงินเกินกำลัง
  </footer>
</main>

<script type="module" src="ui/app.js"></script>
</body>
</html>
